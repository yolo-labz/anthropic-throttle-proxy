sonar.projectKey=yolo-labz_anthropic-throttle-proxy
sonar.projectName=anthropic-throttle-proxy
sonar.organization=yolo-labz
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml
sonar.exclusions=**/__pycache__/**,**/*.egg-info/**,dist/**,build/**
sonar.sourceEncoding=UTF-8

# python:S7503 ("use async features or drop async") misfires on aiohttp:
# route handlers + lifecycle hooks MUST be `async def` per aiohttp's contract
# even when the body needs no await. Scoped to the package, documented here
# instead of per-line NOSONAR (the alignment gate bans in-code suppressions).
#
# Web:S6845 ("tabIndex only on interactive elements") misfires on keyboard-
# scrollable containers: axe-core's scrollable-region-focusable rule REQUIRES
# tabindex="0" on scrollable regions (our <section aria-label> table wraps),
# and S6822 simultaneously bans the explicit role="region" that would appease
# S6845 — the sonar rule pair is self-contradictory for this WAI pattern.
sonar.issue.ignore.multicriteria=aiohttpAsync,scrollRegionTabindex
sonar.issue.ignore.multicriteria.aiohttpAsync.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.aiohttpAsync.resourceKey=src/anthropic_throttle_proxy/**
sonar.issue.ignore.multicriteria.scrollRegionTabindex.ruleKey=Web:S6845
sonar.issue.ignore.multicriteria.scrollRegionTabindex.resourceKey=src/anthropic_throttle_proxy/ui/templates/**
