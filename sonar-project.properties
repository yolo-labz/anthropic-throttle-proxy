sonar.projectKey=yolo-labz_anthropic-throttle-proxy
sonar.projectName=anthropic-throttle-proxy
sonar.organization=yolo-labz
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml
sonar.exclusions=**/__pycache__/**,**/*.egg-info/**,dist/**,build/**
sonar.sourceEncoding=UTF-8

# python:S7503 ("use async features or drop async") misfires on aiohttp:
# route handlers + lifecycle hooks MUST be `async def` per aiohttp's contract
# even when the body needs no await. Scoped to the package, documented here
# instead of per-line NOSONAR (the alignment gate bans in-code suppressions).
sonar.issue.ignore.multicriteria=aiohttpAsync
sonar.issue.ignore.multicriteria.aiohttpAsync.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.aiohttpAsync.resourceKey=src/anthropic_throttle_proxy/**
