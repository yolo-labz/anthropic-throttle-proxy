name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel superseded scans for the same branch/PR. Sonar only needs the newest
# coverage.xml and blame data for a given ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (full history for blame-based new-code detection)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv + Python 3.13
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.2" # pin the uv binary (matches Dockerfile/CI) for reproducible resolution
          python-version: "3.13"

      - name: Install dependencies (locked)
        run: uv sync --frozen --group dev

      - name: Run tests with coverage
        run: uv run pytest --cov=anthropic_throttle_proxy --cov-report=xml --cov-report=term-missing

      - name: Skip if SonarQube host not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
        run: |
          if [ -z "$HOST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_HOST_URL variable not set — skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
