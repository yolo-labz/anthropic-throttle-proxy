name: OSV-Scanner

# Dependency vulnerability scanning (release-eng rule 6 in this org): OSV-Scanner
# V2 over the Python dependency graph (uv.lock). This is a Python repo, so there
# is no govulncheck to drop (rule: OSV-Scanner V2 invokes govulncheck internally
# only on Go repos). Findings surface as SARIF in the Security tab; the scan is
# continue-on-error so a fresh advisory never hard-blocks a PR — triage in-tab.

on:
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  scan:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # checkout source for the scan.
      security-events: write # upload SARIF to GitHub Security tab.
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --format sarif
            --output results.sarif
            .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: results.sarif
