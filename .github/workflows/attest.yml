name: Release attestation

# Build the Docker image, then publish build-provenance + SBOM attestations
# bound to its registry digest. Triggers ONLY on a version tag (vX.Y.Z) or a
# manual dispatch — never on pull_request — so merging this workflow publishes
# nothing until a release is deliberately cut. Never re-tag a release: cut
# vX.Y.Z+1 on a botched publish (stale provenance otherwise).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Deny-all at workflow scope; the job re-grants the minimum it needs.
permissions: {}

# Serialize releases per ref; never cancel a publish in flight (stale/partial
# attestations otherwise).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-attest:
    name: build + provenance + SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # checkout
      id-token: write # OIDC signing for the attestations
      attestations: write # publish provenance + SBOM attestations
      packages: write # push the image to GHCR
    env:
      # github.* values are bound to env (never interpolated into run: directly)
      # so a crafted ref/actor cannot inject shell.
      REGISTRY: ghcr.io
      REPO: ${{ github.repository }}
      GIT_SHA: ${{ github.sha }}
      REF_TYPE: ${{ github.ref_type }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compute build metadata
        id: meta
        run: |
          image="$(printf '%s/%s' "$REGISTRY" "$REPO" | tr '[:upper:]' '[:lower:]')"
          if [ "$REF_TYPE" = "tag" ]; then
            version="${REF_NAME#v}"
          else
            version="0.1.0-dispatch.$(git rev-parse --short HEAD)"
          fi
          # Refuse to build/push/move :latest for a non-semver tag (e.g. a typo
          # like `vlatest` or `vfoo`); only vMAJOR.MINOR.PATCH[-pre] may publish.
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::refusing to publish non-semver version '$version'"
            exit 1
          fi
          epoch="$(git log -1 --format=%ct)"
          {
            echo "image=$image"
            echo "version=$version"
            echo "epoch=$epoch"
            echo "build_date=$(date -u -d "@$epoch" +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin

      - name: Build and push image
        id: build
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          # BuildKit reads SOURCE_DATE_EPOCH from the environment to normalize
          # layer timestamps, making the image bytes reproducible across rebuilds.
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.epoch }}
        run: |
          tags="--tag $IMAGE:$VERSION"
          if [ "$REF_TYPE" = "tag" ]; then
            tags="$tags --tag $IMAGE:latest"
          fi
          # shellcheck disable=SC2086  # $tags is an intentional word-split flag list
          docker buildx build \
            --build-arg APP_VERSION="$VERSION" \
            --build-arg GIT_SHA="$GIT_SHA" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --label org.opencontainers.image.revision="$GIT_SHA" \
            --label org.opencontainers.image.source="https://github.com/$REPO" \
            --label org.opencontainers.image.version="$VERSION" \
            $tags \
            --push \
            --provenance=false \
            --metadata-file "$RUNNER_TEMP/build-meta.json" \
            .
          digest="$(jq -r '."containerimage.digest"' "$RUNNER_TEMP/build-meta.json")"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "ref=$IMAGE@$digest" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.build.outputs.ref }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.build.outputs.ref }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # actions/attest-sbom is deprecated; the unified actions/attest carries the
      # SBOM as the predicate with the matching CycloneDX/SPDX predicate-type.
      - name: Attest SBOM (CycloneDX)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          predicate-type: https://cyclonedx.org/bom
          predicate-path: sbom.cdx.json
          push-to-registry: true

      - name: Attest SBOM (SPDX)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          predicate-type: https://spdx.dev/Document/v2.3
          predicate-path: sbom.spdx.json
          push-to-registry: true

      # Self-proving evidence: crypto-verify each attestation (signature +
      # signer identity = this repo's workflow) against the pushed digest using
      # the job's own GITHUB_TOKEN. Fails loud if any attestation is missing or
      # forged — the release log becomes the durable `gh attestation verify`
      # proof without needing a desktop read:packages token.
      - name: Verify attestations
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ steps.build.outputs.ref }}
        run: |
          for pt in \
            https://slsa.dev/provenance/v1 \
            https://cyclonedx.org/bom \
            https://spdx.dev/Document/v2.3; do
            echo "::group::verify $pt"
            gh attestation verify "oci://$REF" --repo "$REPO" --predicate-type "$pt"
            echo "::endgroup::"
          done
